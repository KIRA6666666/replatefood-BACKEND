services:
  postgres:
    image: postgres:16-alpine
    container_name: mealsaver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealsaver
      POSTGRES_PASSWORD: mealsaver
      POSTGRES_DB: mealsaver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealsaver -d mealsaver"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mealsaver-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mealsaver:mealsaver@postgres:5432/mealsaver
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend_mealate/mealate
      dockerfile: Dockerfile
    container_name: mealsaver-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
