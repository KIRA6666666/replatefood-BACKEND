services:
  postgres:
    image: postgres:16-alpine
    container_name: mealsaver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealsaver
      POSTGRES_PASSWORD: mealsaver
      POSTGRES_DB: mealsaver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealsaver -d mealsaver"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: